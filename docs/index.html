<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f1e6">
<title>Breathe</title>
<style>
  :root {
    --canvas: #f6f1e6;
    --canvas-deep: #ece3d0;
    --ink: #2f2a22;
    --ink-soft: rgba(47, 42, 34, 0.6);
    --ink-faint: rgba(47, 42, 34, 0.36);
    --halo: #b96b45;
    --btn-bg: #2f2a22;
    --btn-ink: #f6f1e6;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    overscroll-behavior: none;
    background: var(--canvas-deep);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    background: var(--canvas);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    color: var(--ink);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: max(28px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom));
    opacity: 0;
    animation: pageIn 0.8s ease forwards;
  }

  @keyframes pageIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .top {
    font-size: 13px;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    text-align: center;
    min-height: 16px;
  }

  .stage {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 44px;
  }

  .halo-wrap {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .halo-svg {
    position: absolute;
    inset: 0;
  }

  .halo-svg circle {
    fill: none;
    stroke: var(--halo);
    opacity: 0.9;
  }

    height: 132px;

  .bottom {
    position: relative;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phase-info, .done-info {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }

  .phase-info.show, .done-info.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .phase-word {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .phase-seconds {
    font-size: 40px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    line-height: 1;
  }

  button {
    appearance: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }

  .btn {
    background: var(--btn-bg);
    color: var(--btn-ink);
    font-size: 14px;
    padding: 12px 28px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }

  .replay {
    background: none;
    color: var(--ink-faint);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 8px;
  }
  .replay:hover { color: var(--ink-soft); }

  @media (prefers-reduced-motion: reduce) {
    body { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<div class="top" id="topLabel"></div>

<div class="stage">
  <div class="halo-wrap">
    <svg class="halo-svg" viewBox="0 0 220 220">
      <circle id="haloRing" cx="110" cy="110" r="69" stroke-width="2"></circle>
    </svg>

    <div class="figure" aria-hidden="true"></div>
  </div>

  <div class="bottom">
    <div class="phase-info" id="phaseInfo">
      <div class="phase-word" id="phaseWord">Inhalá</div>
      <div class="phase-seconds" id="phaseSeconds">4</div>
    </div>
    <div class="done-info" id="doneInfo">
      <button class="btn" id="continueBtn"></button>
    </div>
  </div>
</div>

<button class="replay" id="replayBtn">REPETIR</button>

<script>
  // Redes soportadas: id usado en ?return= y el URL scheme para reabrirlas.
  const APPS = {
    instagram: { name: 'Instagram', scheme: 'instagram://' },
    tiktok:    { name: 'TikTok', scheme: 'tiktok://' },
    twitter:   { name: 'X', scheme: 'twitter://' },
    facebook:  { name: 'Facebook', scheme: 'fb://' },
    snapchat:  { name: 'Snapchat', scheme: 'snapchat://' },
    reddit:    { name: 'Reddit', scheme: 'reddit://' },
    youtube:   { name: 'YouTube', scheme: 'youtube://' },
    whatsapp:  { name: 'WhatsApp', scheme: 'whatsapp://' }
  };

  const params = new URLSearchParams(location.search);
  const returnID = (params.get('return') || '').trim().toLowerCase();
  const app = APPS[returnID] || null;
  const count = parseInt(params.get('count'), 10);
  const hasCount = app && Number.isFinite(count) && count > 0;

  const topLabel = document.getElementById('topLabel');
  const halo = document.getElementById('haloRing');
  const phaseInfo = document.getElementById('phaseInfo');
  const doneInfo = document.getElementById('doneInfo');
  const phaseWord = document.getElementById('phaseWord');
  const phaseSeconds = document.getElementById('phaseSeconds');
  const replayBtn = document.getElementById('replayBtn');
  const continueBtn = document.getElementById('continueBtn');

  continueBtn.textContent = app ? `Abrir ${app.name}` : 'Continuar';

  topLabel.textContent = hasCount
    ? (count === 1 ? `Primera pausa con ${app.name}` : `${count} pausas con ${app.name}`)
    : (app ? app.name : '');

  // Técnica 4-7-8: inhalá 4s, sostené 7s, exhalá 8s.
  const INHALE_S = 4;
  const HOLD_S = 7;
  const EXHALE_S = 8;
  const TOTAL_S = INHALE_S + HOLD_S + EXHALE_S;

  // El halo mantiene el borde interior fijo pegado a la figura: crece
  // únicamente hacia afuera (inhalá) y se retrae hacia adentro (exhalá).
  const R_IN = 68;
  const SW_REST = 2;
  const SW_MAX = 32;

  let timers = [];
  let haloRAF = null;

  function setHaloWidth(sw) {
    halo.setAttribute('r', R_IN + sw / 2);
    halo.setAttribute('stroke-width', sw);
  }

  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function animateHalo(fromSW, toSW, durationMs) {
    if (haloRAF) cancelAnimationFrame(haloRAF);
    const start = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - start) / durationMs);
      setHaloWidth(fromSW + (toSW - fromSW) * easeInOutCubic(t));
      if (t < 1) haloRAF = requestAnimationFrame(frame);
    }
    haloRAF = requestAnimationFrame(frame);
  }

  function clearTimers() {
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  function runPhaseCountdown(seconds) {
    let remaining = seconds;
    phaseSeconds.textContent = remaining;
    const tick = () => {
      remaining -= 1;
      if (remaining > 0) {
        phaseSeconds.textContent = remaining;
        timers.push(setTimeout(tick, 1000));
      }
    };
    timers.push(setTimeout(tick, 1000));
  }

  function run() {
    clearTimers();
    doneInfo.classList.remove('show');
    phaseInfo.classList.add('show');
    setHaloWidth(SW_REST);

    phaseWord.textContent = 'Inhalá';
    runPhaseCountdown(INHALE_S);
    animateHalo(SW_REST, SW_MAX, INHALE_S * 1000);

    timers.push(setTimeout(() => {
      phaseWord.textContent = 'Sostené';
      runPhaseCountdown(HOLD_S);
      setHaloWidth(SW_MAX);
    }, INHALE_S * 1000));

    timers.push(setTimeout(() => {
      phaseWord.textContent = 'Exhalá';
      runPhaseCountdown(EXHALE_S);
      animateHalo(SW_MAX, SW_REST, EXHALE_S * 1000);
    }, (INHALE_S + HOLD_S) * 1000));

    timers.push(setTimeout(() => {
      phaseInfo.classList.remove('show');
      doneInfo.classList.add('show');
    }, TOTAL_S * 1000));
  }

  replayBtn.addEventListener('click', run);

  continueBtn.addEventListener('click', () => {
    if (app) {
      // Gesto del usuario (el tap) habilita a Safari a abrir el URL scheme.
      window.location.href = app.scheme;
    } else {
      run();
    }
  });

  run();
</script>
</body>
</html>
